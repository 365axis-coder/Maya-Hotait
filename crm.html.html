<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MH Intelligence CRM™</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#1B2A4A;--navy2:#152038;--navy3:#0D1A2E;--gold:#C8A96E;--gold2:#E2C98F;--orange:#E86030;--white:#F8F5EF;--muted:rgba(248,245,239,0.5);--border:rgba(200,169,110,0.15);--green:#5B8E6A;--blue:#2980B9;--purple:#8E44AD;--serif:'Cormorant Garamond',Georgia,serif;--sans:'Montserrat',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--navy3);color:var(--white);font-family:var(--sans);font-weight:300;min-height:100vh}
#lockScreen{position:fixed;inset:0;z-index:9999;background:var(--navy3);display:flex;align-items:center;justify-content:center}
.lbox{width:min(380px,92vw);background:rgba(27,42,74,0.6);border:1px solid var(--border);padding:48px 40px;text-align:center;position:relative}
.lbox::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--orange),var(--gold),transparent)}
.llogo{font-family:var(--serif);font-size:26px;font-weight:300;letter-spacing:4px;color:var(--gold);margin-bottom:3px}
.ltag{font-size:7px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:32px}
.llbl{font-size:8px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;text-align:left}
.linp{width:100%;background:rgba(27,42,74,0.5);border:1px solid var(--border);color:var(--white);font-family:var(--sans);font-size:13px;padding:11px 14px;outline:none;transition:border-color 0.3s;margin-bottom:14px}
.linp:focus{border-color:var(--gold)}
.lbtn{width:100%;font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--navy3);background:var(--gold);border:none;padding:13px;cursor:pointer;transition:background 0.3s}
.lbtn:hover{background:var(--gold2)}
.lerr{font-size:10px;color:var(--orange);margin-top:8px;display:none}
#app{display:none}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:230px;background:var(--navy2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;overflow-y:auto}
.sb-brand{padding:22px 20px 16px;border-bottom:1px solid var(--border)}
.sb-name{font-family:var(--serif);font-size:15px;font-weight:300;letter-spacing:3px;color:var(--gold)}
.sb-tag{font-size:7px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:2px}
.sb-nav{flex:1;padding:12px 0}
.sb-sec{font-size:7px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(200,169,110,0.3);padding:12px 20px 4px}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;font-size:9px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);transition:all 0.2s;border-left:2px solid transparent}
.sb-item:hover{color:var(--white);background:rgba(200,169,110,0.04)}
.sb-item.active{color:var(--gold);border-left-color:var(--gold);background:rgba(200,169,110,0.06)}
.sb-item svg{width:13px;height:13px;stroke:currentColor;flex-shrink:0}
.sb-badge{margin-left:auto;font-size:8px;font-weight:600;background:var(--gold);color:var(--navy3);padding:1px 6px;border-radius:20px}
.sb-hot-badge{margin-left:auto;font-size:8px;font-weight:600;background:var(--orange);color:var(--white);padding:1px 6px;border-radius:20px;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.5}}
.sb-foot{padding:12px 20px;border-top:1px solid var(--border);font-size:9px;color:var(--muted)}
.sb-foot a{color:var(--gold);text-decoration:none}
.main{margin-left:230px;min-height:100vh}
.topbar{position:sticky;top:0;z-index:50;background:rgba(13,26,46,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:13px 30px;display:flex;align-items:center;justify-content:space-between;gap:14px}
.tb-title{font-family:var(--serif);font-size:18px;font-weight:300;color:var(--white)}
.tb-title em{font-style:italic;color:var(--gold)}
.tb-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.btn{display:flex;align-items:center;gap:5px;font-size:8px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:7px 14px;border:none;cursor:pointer;font-family:var(--sans);transition:all 0.2s}
.btn-g{color:var(--navy3);background:var(--gold)}.btn-g:hover{background:var(--gold2)}
.btn-o{color:var(--muted);background:transparent;border:1px solid var(--border)}.btn-o:hover{color:var(--white)}
.btn svg{width:11px;height:11px;stroke:currentColor}
.sinp-wrap{position:relative}
.sinp{background:rgba(27,42,74,0.5);border:1px solid var(--border);color:var(--white);font-family:var(--sans);font-size:11px;padding:7px 12px 7px 30px;outline:none;width:190px;transition:border-color 0.3s}
.sinp:focus{border-color:var(--gold)}
.sinp::placeholder{color:var(--muted)}
.sico{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:11px;height:11px;stroke:var(--muted)}
.vtoggle{display:flex;border:1px solid var(--border)}
.vbtn{font-size:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:6px 10px;border:none;cursor:pointer;font-family:var(--sans);background:transparent;color:var(--muted);transition:all 0.2s;display:flex;align-items:center;gap:4px}
.vbtn svg{width:10px;height:10px;stroke:currentColor}
.vbtn.active{background:var(--gold);color:var(--navy3)}
.content{padding:24px 30px}
.stats-row{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:20px}
.sc{background:rgba(27,42,74,0.4);border:1px solid var(--border);padding:14px;position:relative;overflow:hidden}
.sc:hover{border-color:rgba(200,169,110,0.3)}
.sc-l{font-size:7px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.sc-n{font-family:var(--serif);font-size:30px;font-weight:300;color:var(--white);line-height:1}
.sc-s{font-size:8px;color:var(--muted);margin-top:4px}
.alert-bar{background:rgba(232,96,48,0.1);border:1px solid rgba(232,96,48,0.2);border-left:3px solid var(--orange);padding:11px 18px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.ab-txt{font-size:11px;color:var(--white);display:flex;align-items:center;gap:8px}
.ab-txt svg{width:13px;height:13px;stroke:var(--orange);flex-shrink:0}
.ab-btn{font-size:8px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--orange);background:none;border:none;cursor:pointer;font-family:var(--sans)}
.hot-panel{background:rgba(232,96,48,0.06);border:1px solid rgba(232,96,48,0.18);padding:14px 18px;margin-bottom:16px}
.hot-hdr{font-size:8px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--orange);margin-bottom:10px;display:flex;align-items:center;gap:7px}
.hot-hdr svg{width:11px;height:11px;stroke:var(--orange)}
.hot-chips{display:flex;gap:8px;flex-wrap:wrap}
.hot-chip{display:flex;align-items:center;gap:8px;background:rgba(232,96,48,0.08);border:1px solid rgba(232,96,48,0.18);padding:6px 11px;cursor:pointer;transition:all 0.2s}
.hot-chip:hover{background:rgba(232,96,48,0.15)}
.hc-name{font-size:11px;color:var(--white)}
.hc-role{font-size:9px;color:var(--muted)}
.filters{display:flex;align-items:center;gap:5px;margin-bottom:14px;flex-wrap:wrap}
.fb{font-size:7px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:5px 10px;border:1px solid var(--border);color:var(--muted);background:transparent;cursor:pointer;font-family:var(--sans);transition:all 0.2s}
.fb:hover{color:var(--white);border-color:rgba(200,169,110,0.3)}
.fb.active{color:var(--navy3);background:var(--gold);border-color:var(--gold)}
.tbl{background:rgba(27,42,74,0.25);border:1px solid var(--border);overflow:hidden}
.th-row{display:grid;grid-template-columns:24px 1.6fr 1.1fr 0.7fr 0.6fr 0.7fr 0.7fr 0.7fr 0.9fr;gap:0;padding:8px 12px;border-bottom:1px solid var(--border);background:rgba(13,26,46,0.5)}
.th{font-size:7px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.tbody{max-height:460px;overflow-y:auto}
.tbody::-webkit-scrollbar{width:2px}
.tbody::-webkit-scrollbar-thumb{background:rgba(200,169,110,0.2)}
.tr{display:grid;grid-template-columns:24px 1.6fr 1.1fr 0.7fr 0.6fr 0.7fr 0.7fr 0.7fr 0.9fr;gap:0;padding:10px 12px;border-bottom:1px solid rgba(200,169,110,0.04);cursor:pointer;transition:background 0.2s;align-items:center}
.tr:hover{background:rgba(200,169,110,0.04)}
.tr.ph{border-left:2px solid var(--orange)}
.tr.pm{border-left:2px solid var(--gold)}
.td{font-size:11px;color:var(--white);padding-right:5px;overflow:hidden}
.td-s{font-size:9px;color:var(--muted)}
.td-n{font-size:9px;color:var(--muted);font-family:var(--serif)}
.bdg{font-size:7px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border:1px solid;display:inline-block;white-space:nowrap}
.bd{color:var(--gold);border-color:rgba(200,169,110,0.3);background:rgba(200,169,110,0.06)}
.bb{color:var(--orange);border-color:rgba(232,96,48,0.25);background:rgba(232,96,48,0.05)}
.bi{color:#7BC48A;border-color:rgba(91,142,106,0.3);background:rgba(91,142,106,0.06)}
.bc{color:var(--blue);border-color:rgba(41,128,185,0.3);background:rgba(41,128,185,0.06)}
.bk{color:var(--purple);border-color:rgba(142,68,173,0.3);background:rgba(142,68,173,0.06)}
.scb{display:inline-flex;align-items:center;justify-content:center;width:34px;height:20px;font-family:var(--serif);font-size:11px;font-weight:300;border:1px solid}
.sh{color:#7BC48A;border-color:rgba(91,142,106,0.3);background:rgba(91,142,106,0.08)}
.sm{color:var(--gold);border-color:rgba(200,169,110,0.3);background:rgba(200,169,110,0.06)}
.sl{color:var(--orange);border-color:rgba(232,96,48,0.3);background:rgba(232,96,48,0.06)}
.std{display:inline-flex;align-items:center;gap:3px;font-size:8px;font-weight:500;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.std::before{content:'';width:4px;height:4px;border-radius:50%;flex-shrink:0}
.s-new::before{background:#E8B84B}.s-new{color:#E8B84B}
.s-qualified::before{background:var(--blue)}.s-qualified{color:var(--blue)}
.s-booked::before{background:var(--gold)}.s-booked{color:var(--gold)}
.s-proposal::before{background:var(--purple)}.s-proposal{color:var(--purple)}
.s-client::before{background:var(--green)}.s-client{color:var(--green)}
.s-cold::before{background:var(--muted)}.s-cold{color:var(--muted)}
.pri{font-size:7px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border:1px solid}
.ph2{color:var(--orange);border-color:rgba(232,96,48,0.3);background:rgba(232,96,48,0.08)}
.pm2{color:var(--gold);border-color:rgba(200,169,110,0.25);background:rgba(200,169,110,0.05)}
.pl2{color:var(--muted);border-color:rgba(248,245,239,0.1);background:transparent}
.deal{font-size:7px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border:1px solid}
.dh{color:#7BC48A;border-color:rgba(91,142,106,0.3);background:rgba(91,142,106,0.08)}
.dm{color:var(--gold);border-color:rgba(200,169,110,0.25);background:rgba(200,169,110,0.05)}
.dl{color:var(--muted);border-color:rgba(248,245,239,0.1);background:transparent}
.act{display:flex;align-items:center;gap:4px;font-size:8px;color:var(--white)}
.act svg{width:9px;height:9px;stroke:var(--gold);flex-shrink:0}
.act-ov{color:var(--orange)}
.act-ov svg{stroke:var(--orange)}
.pipeline{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;align-items:start}
.pcol{background:rgba(27,42,74,0.3);border:1px solid var(--border);min-height:180px}
.pch{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.pct{font-size:7px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.pcn{font-family:var(--serif);font-size:18px;font-weight:300;color:var(--gold)}
.pcards{padding:6px;display:flex;flex-direction:column;gap:5px}
.pcard{background:rgba(27,42,74,0.5);border:1px solid var(--border);padding:9px 10px;cursor:pointer;transition:all 0.2s}
.pcard:hover{border-color:rgba(200,169,110,0.3)}
.pcard-name{font-size:10px;color:var(--white);margin-bottom:2px}
.pcard-co{font-size:9px;color:var(--muted)}
.pcard-foot{display:flex;align-items:center;justify-content:space-between;margin-top:7px}
.pn .pch{border-top:2px solid #E8B84B}.pq .pch{border-top:2px solid var(--blue)}
.pb .pch{border-top:2px solid var(--gold)}.pp .pch{border-top:2px solid var(--purple)}.pc .pch{border-top:2px solid var(--green)}
.modal-ov{position:fixed;inset:0;z-index:500;background:rgba(13,26,46,0.88);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;padding:14px}
.modal-ov.open{display:flex}
.modal{background:var(--navy2);border:1px solid rgba(200,169,110,0.2);width:min(700px,98vw);max-height:92vh;overflow-y:auto;position:relative}
.modal::-webkit-scrollbar{width:2px}
.modal::-webkit-scrollbar-thumb{background:rgba(200,169,110,0.2)}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--orange),var(--gold),transparent)}
.mclose{position:absolute;top:13px;right:16px;background:none;border:none;color:var(--muted);font-size:17px;cursor:pointer;transition:color 0.2s;z-index:1}
.mclose:hover{color:var(--gold)}
.mhead{padding:26px 30px 14px}
.mname{font-family:var(--serif);font-size:24px;font-weight:300;color:var(--white);margin-bottom:3px;margin-top:10px}
.mrole{font-size:11px;color:var(--muted)}
.mbody{padding:0 30px 26px}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.mf{border-bottom:1px solid rgba(200,169,110,0.07);padding-bottom:11px}
.mfl{font-size:7px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.mfv{font-size:12px;color:var(--white)}
.msect{font-size:8px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.mangle{background:rgba(200,169,110,0.06);border:1px solid rgba(200,169,110,0.2);border-left:3px solid var(--gold);padding:13px 16px;margin-bottom:18px}
.mangle-l{font-size:7px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:7px;display:flex;align-items:center;gap:6px}
.mangle-l svg{width:10px;height:10px;stroke:var(--gold)}
.mangle-t{font-family:var(--serif);font-size:14px;font-style:italic;color:var(--white);line-height:1.6}
.mins{background:rgba(13,26,46,0.4);border:1px solid var(--border);border-left:2px solid rgba(200,169,110,0.2);padding:12px 16px;margin-bottom:18px}
.mins-l{font-size:7px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.mins-t{font-family:var(--serif);font-size:12px;font-style:italic;color:var(--muted);line-height:1.6}
.mdim{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.mdn{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);width:105px;flex-shrink:0}
.mdb{flex:1;height:2px;background:rgba(200,169,110,0.08)}
.mdf{height:100%;background:linear-gradient(90deg,var(--gold),var(--orange))}
.mdp{font-family:var(--serif);font-size:11px;color:var(--gold);width:26px;text-align:right}
.mmeta{display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:18px;padding:12px;background:rgba(13,26,46,0.3);border:1px solid var(--border)}
.mmi{}
.mmil{font-size:7px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.msel{background:rgba(27,42,74,0.5);border:1px solid var(--border);color:var(--white);font-family:var(--sans);font-size:11px;padding:5px 9px;outline:none;cursor:pointer;transition:border-color 0.3s}
.msel:focus{border-color:var(--gold)}
.msel option{background:var(--navy2)}
.mstatus{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.msl{font-size:7px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-right:3px}
.sbt{font-size:7px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:4px 9px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:var(--sans);transition:all 0.2s}
.sbt.sel{background:var(--gold);border-color:var(--gold);color:var(--navy3)}
.tpls{margin-bottom:18px}
.tpl-row{display:flex;gap:7px;flex-wrap:wrap}
.tplb{font-size:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:6px 12px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:var(--sans);transition:all 0.2s;display:flex;align-items:center;gap:5px}
.tplb:hover{color:var(--white);border-color:rgba(200,169,110,0.3);background:rgba(200,169,110,0.04)}
.tplb svg{width:10px;height:10px;stroke:currentColor}
.mnl{font-size:7px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.mni{width:100%;background:rgba(13,26,46,0.4);border:1px solid var(--border);color:var(--white);font-family:var(--sans);font-size:11px;padding:9px 11px;outline:none;resize:vertical;min-height:68px;transition:border-color 0.3s}
.mni:focus{border-color:var(--gold)}
.msave{font-family:var(--sans);font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--navy3);background:var(--gold);border:none;padding:9px 20px;cursor:pointer;transition:background 0.3s;margin-top:10px}
.msave:hover{background:var(--gold2)}
.tpl-ov{position:fixed;inset:0;z-index:600;background:rgba(13,26,46,0.92);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;padding:16px}
.tpl-ov.open{display:flex}
.tpl-box{background:var(--navy2);border:1px solid rgba(200,169,110,0.2);width:min(560px,96vw);max-height:80vh;overflow-y:auto;padding:28px;position:relative}
.tpl-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--orange),var(--gold),transparent)}
.tplc{position:absolute;top:13px;right:16px;background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer}
.tpl-title{font-family:var(--serif);font-size:18px;font-weight:300;color:var(--white);margin-bottom:3px}
.tpl-sub{font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:18px}
.tpl-text{background:rgba(13,26,46,0.5);border:1px solid var(--border);padding:18px;font-size:12px;color:var(--white);line-height:1.8;white-space:pre-wrap;margin-bottom:14px}
.tpl-acts{display:flex;gap:9px;flex-wrap:wrap}
.tcopy{font-family:var(--sans);font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--navy3);background:var(--gold);border:none;padding:9px 18px;cursor:pointer;transition:background 0.3s}
.tcopy:hover{background:var(--gold2)}
.twa{font-family:var(--sans);font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--white);background:#25D366;border:none;padding:9px 16px;cursor:pointer;display:flex;align-items:center;gap:6px}
.settings-wrap{max-width:560px}
.ssec{margin-bottom:28px}
.stitle{font-size:8px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.sfield{margin-bottom:10px}

.snote{font-size:9px;color:var(--muted);margin-top:7px;font-style:italic}
.empty{text-align:center;padding:56px 20px}
.empty svg{width:36px;height:36px;stroke:rgba(200,169,110,0.12);margin:0 auto 14px;display:block}
.empty-t{font-family:var(--serif);font-size:18px;font-weight:300;color:var(--muted);margin-bottom:5px}

<script>
var PWD='MH@2025',FD=3,cp='all',cf='all',cv='table',aid=null;
function unlock(){var p=document.getElementById('lPwd').value;if(p===PWD){document.getElementById('lockScreen').style.display='none';document.getElementById('app').style.display='block';init()}else{var e=document.getElementById('lErr');e.style.display='block';setTimeout(function(){e.style.display='none'},2500)}}
function gl(){try{var d=localStorage.getItem('mhcrm');return d?JSON.parse(d):[]}catch(e){return[]}}
function sl(l){try{localStorage.setItem('mhcrm',JSON.stringify(l))}catch(e){}}
function al(l){var leads=gl();l.id='L'+Date.now()+Math.floor(Math.random()*999);l.date=l.date||new Date().toISOString();l.status=l.status||'new';l.notes=l.notes||'';l.nextAction=l.nextAction||'Follow-up';l.priority=l.priority||cp2(l);l.deal=l.deal||cd(l);leads.unshift(l);sl(leads);ub()}
function ul(id,u){sl(gl().map(function(l){return l.id===id?Object.assign({},l,u):l}))}
function cp2(l){var p=0,r=(l.role||'').toLowerCase();if(r.includes('ceo')||r.includes('chair')||r.includes('managing'))p+=3;else if(r.includes('cfo')||r.includes('board')||r.includes('director'))p+=2;else p+=1;var sc=parseInt(l.score)||50;if(sc<45)p+=3;else if(sc<65)p+=2;else p+=1;if(l.source==='booking')p+=2;if(l.source==='intelligence'||l.source==='diagnostic')p+=1;return p>=6?'high':p>=4?'med':'low'}
function cd(l){var r=(l.role||'').toLowerCase(),p=0;if(r.includes('ceo')||r.includes('chair'))p+=3;else if(r.includes('cfo')||r.includes('board'))p+=2;else p+=1;if(l.source==='booking')p+=2;if(l.source==='intelligence')p+=1;return p>=5?'high':p>=3?'mid':'low'}
function ga(l){var sc=parseInt(l.score)||0,r=(l.role||'').toLowerCase(),t=(l.track||'').toLowerCase();if(t.includes('board')||l.source==='bgmi'){if(sc<50)return 'Position as urgent governance restructuring — board lacks structural independence.';if(sc<70)return 'Focus on board challenge function and CEO accountability — visible gaps in strategic oversight.';return 'Highlight governance sustainability during growth phases.'}if(r.includes('cfo')||r.includes('finance'))return 'Lead with financial intelligence gap — reactive vs strategic control system. Show cost of inaction.';if(sc<45)return 'Open with structural misalignment diagnosis — organization is reactive, not strategic. Frame as urgency.';if(sc<65)return 'Focus on governance visibility and decision ownership gaps — execution constrained by structural ambiguity.';return 'Position as strategic acceleration — strong foundation, targeted gap closure.'}
function io(l){if(l.status==='client'||l.status==='cold')return false;return (new Date()-new Date(l.date))/(1000*60*60*24)>=FD}
function hotL(){return gl().filter(function(l){return l.priority==='high'&&l.status!=='client'&&l.status!=='cold'})}
function ovL(){return gl().filter(function(l){return io(l)})}
function init(){ub();go('all')}
function go(p){cp=p;cf='all';document.querySelectorAll('.sb-item').forEach(function(el){el.classList.remove('active')});var m={'all':0,'hot':1,'pipeline':2,'diagnostic':3,'bgmi':4,'intelligence':5,'contact':6,'booking':7,'settings':8},items=document.querySelectorAll('.sb-item');if(m[p]!==undefined&&items[m[p]])items[m[p]].classList.add('active');var tt={'all':'All <em>Leads</em>','hot':'🔥 Hot <em>Leads</em>','pipeline':'Pipeline <em>View</em>','diagnostic':'Diagnostic <em>Leads</em>','bgmi':'BGMI™ <em>Leads</em>','intelligence':'Intelligence <em>Leads</em>','contact':'Contact <em>Inquiries</em>','booking':'Session <em>Bookings</em>','settings':'CRM <em>Settings</em>'};document.getElementById('pgTitle').innerHTML=tt[p]||'';document.getElementById('vt').style.display=p!=='settings'?'flex':'none';rnd()}
function sv(v){cv=v;document.getElementById('vtT').classList.toggle('active',v==='table');document.getElementById('vtP').classList.toggle('active',v==='pipeline');rnd()}
function fl(){var leads=gl(),q=(document.getElementById('sInp')||{}).value||'';q=q.toLowerCase();return leads.filter(function(l){var s=cp==='all'||cp==='hot'||cp==='pipeline'||l.source===cp,h=cp!=='hot'||(l.priority==='high'&&l.status!=='client'&&l.status!=='cold'),st=cf==='all'||l.status===cf,sq=!q||(l.name||'').toLowerCase().includes(q)||(l.company||'').toLowerCase().includes(q)||(l.email||'').toLowerCase().includes(q);return s&&h&&st&&sq})}
function rnd(){if(cp==='settings'){rS();return}var leads=fl(),h='';h+=rStats(leads);h+=rAlert();if(cp==='all'||cp==='hot')h+=rHot();if(cv==='pipeline'||cp==='pipeline'){h+=rFilt(leads);h+=rPipe(leads)}else{h+=rFilt(leads);h+=rTbl(leads)}document.getElementById('cnt').innerHTML=h}
function rStats(leads){var t=leads.length,n=leads.filter(function(l){return l.status==='new'}).length,b=leads.filter(function(l){return l.status==='booked'}).length,c=leads.filter(function(l){return l.status==='client'}).length,hot=hotL().length,ov=ovL().length;return'<div class="stats-row">'+sc2('Total',t,'')+sc2('New',n,'Needs action')+sc2('Booked',b,'Sessions')+sc2('Clients',c,'Active')+sc2('🔥 Hot',hot,'Priority 1')+sc2('⏰ Overdue',ov,'Follow up!'+'</div>')}
function sc2(l,n,s){return'<div class="sc"><div class="sc-l">'+l+'</div><div class="sc-n">'+n+'</div><div class="sc-s">'+s+'</div></div>'}
function rAlert(){var ov=ovL();if(!ov.length)return'';var names=ov.slice(0,3).map(function(l){return l.name}).join(', ');return'<div class="alert-bar"><div class="ab-txt"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>⏰ <strong>'+ov.length+' lead'+(ov.length>1?'s':'')+' need follow-up:</strong> '+names+(ov.length>3?' + '+(ov.length-3)+' more':'')+'</div><button class="ab-btn" onclick="go(\'hot\')">View →</button></div>'}
function rHot(){var hot=hotL().slice(0,6);if(!hot.length)return'';var chips=hot.map(function(l){return'<div class="hot-chip" onclick="ol(\''+l.id+'\')"><span style="font-size:14px">🔥</span><div><div class="hc-name">'+(l.name||'—')+'</div><div class="hc-role">'+(l.role||'')+(l.company?' · '+l.company:'')+'</div></div></div>'}).join('');return'<div class="hot-panel"><div class="hot-hdr"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2c0 6-6 8-6 14a6 6 0 0 0 12 0c0-6-6-8-6-14z"/></svg>Priority 1 — Contact Now</div><div class="hot-chips">'+chips+'</div></div>'}
function rFilt(leads){var sts=['all','new','qualified','booked','proposal','client','cold'];return'<div class="filters">'+sts.map(function(s){var c=s==='all'?leads.length:leads.filter(function(l){return l.status===s}).length;return'<button class="fb'+(cf===s?' active':'')+'" onclick="sf2(\''+s+'\')">'+(s==='all'?'All':s.charAt(0).toUpperCase()+s.slice(1))+' ('+c+')</button>'}).join('')+'</div>'}
function sf2(f){cf=f;rnd()}
function rTbl(leads){if(!leads.length)return'<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><div class="empty-t">No leads found</div><div class="empty-s">Adjust filters or add leads</div></div>';
var rows=leads.map(function(l,i){var sc=parseInt(l.score)||0,scC=!l.score?'':sc>=70?'sh':sc>=45?'sm':'sl',scB=l.score?'<span class="scb '+scC+'">'+sc+'</span>':'<span style="color:var(--muted);font-size:9px">—</span>',srC={diagnostic:'bd',bgmi:'bb',intelligence:'bi',contact:'bc',booking:'bk'}[l.source]||'bc',prC={high:'ph2',med:'pm2',low:'pl2'}[l.priority||'low'],dlC={high:'dh',mid:'dm',low:'dl'}[l.deal||'low'],ov=io(l),aC=ov?'act act-ov':'act',aI=ov?'<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>';return'<div class="tr '+(l.priority==='high'?'ph':l.priority==='med'?'pm':'')+'" onclick="ol(\''+l.id+'\')"><div class="td td-n">'+(i+1)+'</div><div class="td"><div>'+(l.name||'—')+'</div><div class="td-s">'+(l.email||'')+'</div></div><div class="td"><div>'+(l.company||'—')+'</div><div class="td-s">'+(l.role||'')+'</div></div><div class="td"><span class="bdg '+srC+'">'+(l.source||'')+'</span></div><div class="td">'+scB+'</div><div class="td"><span class="std s-'+(l.status||'new')+'">'+(l.status||'new')+'</span></div><div class="td"><span class="pri '+prC+'">'+(l.priority||'low')+'</span></div><div class="td"><span class="deal '+dlC+'">'+(l.deal||'low')+'</span></div><div class="td"><div class="'+aC+'">'+aI+'<span>'+(l.nextAction||'Follow-up')+'</span></div></div></div>'}).join('');return'<div class="tbl"><div class="th-row"><div class="th">#</div><div class="th">Name</div><div class="th">Company</div><div class="th">Source</div><div class="th">Score</div><div class="th">Status</div><div class="th">Priority</div><div class="th">Deal</div><div class="th">Next Action</div></div><div class="tbody">'+rows+'</div></div>'}
function rPipe(leads){var stages=[{k:'new',l:'New',c:'pn'},{k:'qualified',l:'Qualified',c:'pq'},{k:'booked',l:'Session Booked',c:'pb'},{k:'proposal',l:'Proposal Sent',c:'pp'},{k:'client',l:'Closed ✓',c:'pc'}];var cols=stages.map(function(st){var sl=leads.filter(function(l){return l.status===st.k});var cards=sl.map(function(l){var sc=parseInt(l.score)||0,scC=!l.score?'':sc>=70?'sh':sc>=45?'sm':'sl';return'<div class="pcard" onclick="ol(\''+l.id+'\')"><div class="pcard-name">'+(l.name||'—')+'</div><div class="pcard-co">'+(l.company||'')+(l.role?' · '+l.role:'')+'</div><div class="pcard-foot">'+(l.score?'<span class="scb '+scC+'" style="width:30px;height:17px;font-size:10px">'+sc+'</span>':'<span></span>')+'<span class="pri '+(l.priority==='high'?'ph2':l.priority==='med'?'pm2':'pl2')+'">'+(l.priority||'low')+'</span></div></div>'}).join('');return'<div class="pcol '+st.c+'"><div class="pch"><div class="pct">'+st.l+'</div><div class="pcn">'+sl.length+'</div></div><div class="pcards">'+(cards||'<div style="padding:10px;font-size:9px;color:var(--muted)">Empty</div>')+'</div></div>'}).join('');return'<div class="pipeline">'+cols+'</div>'}
